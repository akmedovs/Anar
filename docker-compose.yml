services:
  db:
    image: postgres:16-alpine
    container_name: anar-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: anar
      POSTGRES_USER: anar_user
      POSTGRES_PASSWORD: "07570931017072aA!"
    volumes:
      - anar_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U anar_user -d anar"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: anar-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      vision:
        condition: service_started
    environment:
      PORT: 3001
      DATABASE_URL: "postgres://anar_user:07570931017072aA%21@db:5432/anar"
      VEHICLE_VISION_COMMAND: python3
      VEHICLE_VISION_TIMEOUT_MS: 120000
      VEHICLE_VISION_URL: http://vision:8000
      VEHICLE_OCR_BACKENDS: paddle,tesseract
      VEHICLE_PADDLE_TIMEOUT_MS: 45000
      VEHICLE_OCR_LANG: en
      VEHICLE_YOLO_MODEL: ""
      VEHICLE_YOLO_CONF: 0.25
    volumes:
      - anar_uploads:/app/server/uploads
    ports:
      - "3001:3001"

  vision:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: anar-vision
    restart: unless-stopped
    environment:
      PORT: 8000
      VEHICLE_OCR_BACKENDS: easyocr,paddle,tesseract
      VEHICLE_PADDLE_TIMEOUT_MS: 45000
      VEHICLE_OCR_LANG: en
      VEHICLE_YOLO_MODEL: ""
      VEHICLE_YOLO_CONF: 0.25
    volumes:
      - anar_uploads:/app/server/uploads
    command: ["python3", "-m", "uvicorn", "server.vision_service:app", "--host", "0.0.0.0", "--port", "8000"]
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: anar-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "5173:80"

volumes:
  anar_pgdata:
  anar_uploads:
